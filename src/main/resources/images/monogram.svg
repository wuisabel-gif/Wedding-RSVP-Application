  <!-- knot at the base -->
  <circle cx="120" cy="206" r="3" fill="#b06a5b"/>
  <path d="M120,206 q-10,7 -20,5" fill="none" stroke="#b06a5b" stroke-width="1.1" opacity="0.7"/>
  <path d="M120,206 q10,7 20,5" fill="none" stroke="#b06a5b" stroke-width="1.1" opacity="0.7"/>

  <!-- monogram -->
  <text class="script" x="120" y="138" text-anchor="middle" font-size="60" fill="#b06a5b">E &amp; J</text>
  <text class="serif"  x="120" y="164" text-anchor="middle" font-size="12" fill="#a08363">2026</text>
  <text class="serif"  x="120" y="182" text-anchor="middle" font-size="8" letter-spacing="1.5" fill="#a08363">THE OLD MAPLE ORCHARD</text>
