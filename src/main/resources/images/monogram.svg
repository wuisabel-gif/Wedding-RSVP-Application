    <ellipse cx="197.9" cy="90.5" rx="12" ry="4.2" fill="#c2a363" opacity="0.9" transform="rotate(68.0 197.9 90.5)"/>
    <ellipse cx="42.1" cy="90.5" rx="12" ry="4.2" fill="#c2a363" opacity="0.9" transform="rotate(292.0 42.1 90.5)"/>
    <ellipse cx="178.4" cy="61.6" rx="12" ry="4.2" fill="#c2a363" opacity="0.9" transform="rotate(44.0 178.4 61.6)"/>
    <ellipse cx="61.6" cy="61.6" rx="12" ry="4.2" fill="#c2a363" opacity="0.9" transform="rotate(316.0 61.6 61.6)"/>
    <ellipse cx="148.1" cy="185.0" rx="8" ry="3" fill="#c2a363" opacity="0.78" transform="rotate(156.0 148.1 185.0)"/>
