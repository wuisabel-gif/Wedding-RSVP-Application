    <ellipse cx="53.0" cy="138.7" rx="8" ry="3" fill="#c2a363" opacity="0.78" transform="rotate(256.0 53.0 138.7)"/>
    <ellipse cx="188.0" cy="110.0" rx="8" ry="3" fill="#c2a363" opacity="0.78" transform="rotate(80.0 188.0 110.0)"/>
