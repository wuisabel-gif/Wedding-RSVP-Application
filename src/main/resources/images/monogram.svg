<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 248" width="240" height="248" role="img" aria-label="Eleanor and James monogram crest">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=EB+Garamond:wght@500&amp;display=swap');
      .script { font-family: 'Great Vibes', cursive; }
      .serif  { font-family: 'EB Garamond', serif; letter-spacing: 5px; }
    </style>
  </defs>

  <!-- rings -->
  <circle cx="120" cy="122" r="108" fill="none" stroke="#c2a363" stroke-width="1.2" opacity="0.55"/>
  <circle cx="120" cy="122" r="101" fill="none" stroke="#c2a363" stroke-width="0.8" opacity="0.32"/>

  <!-- laurel stems -->
    <path d="M130.2,205.4 A84,84 0 0 1 174.0,57.7" fill="none" stroke="#c2a363" stroke-width="1.1" opacity="0.7"/>
    <path d="M109.8,205.4 A84,84 0 0 0 66.0,57.7" fill="none" stroke="#c2a363" stroke-width="1.1" opacity="0.7"/>

  <!-- laurel leaves -->
    <ellipse cx="137.5" cy="204.2" rx="12" ry="4.2" fill="#c2a363" opacity="0.9" transform="rotate(168.0 137.5 204.2)"/>
